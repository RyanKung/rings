name: Release Build

# Reusable build matrix shared by `Auto Release` and `QACI`, so the PR path builds the exact same
# release targets and a release-only build failure (static-musl C++ linking, or the browser
# `wasm-pack`/`tsc`/`npm pack` path) can't pass PR CI and then break Auto Release.
#
# Separation of concerns — every release target is *built* on both paths; only versioned artifact
# naming + upload are release-only (gated by `publish_artifacts`):
#   - Native targets: `cargo build` always runs; the `zip` rename + upload are gated.
#   - Browser target: `npm pack` always runs (it triggers the root `prepare`:
#     `wasm-pack`/`dist`/`tsc`); only the versioned `mv` rename + upload are gated.
# So PR CI builds everything but never versions or uploads release artifacts; versioning and the
# GitHub Release itself live entirely in `auto-release.yml`.
on:
  workflow_call:
    inputs:
      version:
        description: Version string for naming packaged artifacts (release only).
        required: false
        type: string
        default: ci
      publish_artifacts:
        description: Version-name and upload the built binaries as release artifacts (release only).
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build_macos:
    name: build macos version binary
    timeout-minutes: 60
    runs-on: macos-latest
    strategy:
      matrix:
        arch:
          - x86_64
          - aarch64
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get target
        id: target
        run: echo 'target=${{ matrix.arch }}-apple-darwin' >> $GITHUB_OUTPUT

      - name: Add target
        run: |
          rustup target add ${{ steps.target.outputs.target }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v2.1.0
        with:
          # Automatic per-run token — avoids `secrets: inherit` widening the secret surface on
          # the PR path.
          repo-token: ${{ github.token }}

      - name: Setup rust toolchain
        run: |
          rustup show

      # If you need to reset the cache version, increment the number after `v`
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: auto-release-${{ steps.target.outputs.target }}-v1

      - name: Build
        run: |
          cargo build -p rings-node --bin rings --features node --no-default-features --release --target ${{ steps.target.outputs.target }}

      - name: Package
        if: ${{ inputs.publish_artifacts }}
        run: |
          zip -j rings-${{ inputs.version }}-${{ steps.target.outputs.target }}.zip ./target/${{ steps.target.outputs.target }}/release/rings

      - uses: actions/upload-artifact@v4
        if: ${{ inputs.publish_artifacts }}
        name: Upload artifacts
        with:
          name: rings-${{ inputs.version }}-${{ steps.target.outputs.target }}
          path: rings-${{ inputs.version }}-${{ steps.target.outputs.target }}.zip
          retention-days: 1

  build_linux:
    name: build linux version binary
    timeout-minutes: 60
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        arch:
          - x86_64
        platform:
          - musl
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get target
        id: target
        run: echo 'target=${{ matrix.arch }}-unknown-linux-${{ matrix.platform }}' >> $GITHUB_OUTPUT

      - name: Add target
        run: |
          rustup target add ${{ steps.target.outputs.target }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v2.1.0
        with:
          # Automatic per-run token — avoids `secrets: inherit` widening the secret surface on
          # the PR path.
          repo-token: ${{ github.token }}

      - name: alias compiler
        run: |
          sudo ln -s /bin/g++ /bin/musl-g++

      - name: Setup rust toolchain
        run: |
          rustup show

      - name: Install musl-tools
        if: matrix.platform == 'musl'
        run: |
          set -ex
          sudo apt-get update
          sudo apt-get install -y musl-tools

      # If you need to reset the cache version, increment the number after `v`
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: auto-release-${{ steps.target.outputs.target }}-v1

      - name: Build
        run: |
          cargo build -p rings-node --bin rings --features node --no-default-features --release --target ${{ steps.target.outputs.target }}

      - name: Package
        if: ${{ inputs.publish_artifacts }}
        run: |
          zip -j rings-${{ inputs.version }}-${{ steps.target.outputs.target }}.zip ./target/${{ steps.target.outputs.target }}/release/rings

      - uses: actions/upload-artifact@v4
        if: ${{ inputs.publish_artifacts }}
        name: Upload artifacts
        with:
          name: rings-${{ inputs.version }}-${{ steps.target.outputs.target }}
          path: rings-${{ inputs.version }}-${{ steps.target.outputs.target }}.zip
          retention-days: 1

  # `npm pack` runs the root `prepare` script (`wasm-pack build … --features browser_default`,
  # `dist` assembly, `tsc`) — a real release build path that QACI's cargo-wasm jobs do NOT
  # exercise. So build it on PRs too; only the versioned rename + upload are release-only.
  build_browser:
    name: build browser version binary
    timeout-minutes: 60
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        arch:
          - wasm32
        platform:
          - unknown
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get target
        id: target
        run: echo 'target=${{ matrix.arch }}-unknown-${{ matrix.platform }}' >> $GITHUB_OUTPUT

      - name: Add target
        run: |
          rustup target add ${{ steps.target.outputs.target }}

      - uses: jetli/wasm-bindgen-action@v0.2.0
        with:
          version: "0.2.100"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup protoc
        uses: arduino/setup-protoc@v2.1.0
        with:
          # Automatic per-run token — avoids `secrets: inherit` widening the secret surface on
          # the PR path.
          repo-token: ${{ github.token }}

      - name: Setup rust toolchain
        run: |
          rustup show

      # If you need to reset the cache version, increment the number after `v`
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: auto-release-${{ steps.target.outputs.target }}-v1

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Build
        run: |
          npm install && npm pack

      - name: Package
        if: ${{ inputs.publish_artifacts }}
        run: |
          mv ringsnetwork-rings-node-*.tgz rings-${{ inputs.version }}-${{ steps.target.outputs.target }}.tgz

      - uses: actions/upload-artifact@v4
        if: ${{ inputs.publish_artifacts }}
        name: Upload artifacts
        with:
          name: rings-${{ inputs.version }}-${{ steps.target.outputs.target }}
          path: rings-${{ inputs.version }}-${{ steps.target.outputs.target }}.tgz
          retention-days: 1
