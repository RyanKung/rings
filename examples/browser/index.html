<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rings browser connectivity example</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f5f7f8;
        color: #1f2933;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 1.75rem;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 1rem;
      }

      p {
        margin: 0 0 16px;
        color: #52606d;
      }

      section {
        margin-top: 20px;
        padding: 16px;
        border: 1px solid #d9e2ec;
        border-radius: 8px;
        background: #ffffff;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 0.82rem;
        font-weight: 650;
      }

      input,
      textarea {
        box-sizing: border-box;
        width: 100%;
        border: 1px solid #bcccdc;
        border-radius: 6px;
        padding: 9px 10px;
        font: inherit;
        background: #ffffff;
        color: inherit;
      }

      textarea {
        min-height: 92px;
        resize: vertical;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 9px 12px;
        font: inherit;
        font-weight: 700;
        color: #ffffff;
        background: #1f6feb;
        cursor: pointer;
      }

      button.secondary {
        color: #1f2933;
        background: #e4e7eb;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .value {
        overflow-wrap: anywhere;
        border-radius: 6px;
        padding: 8px 10px;
        background: #f0f4f8;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      #log {
        min-height: 240px;
        max-height: 420px;
        overflow: auto;
        white-space: pre-wrap;
        border-radius: 6px;
        padding: 12px;
        background: #111827;
        color: #d1d5db;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.85rem;
      }

      @media (max-width: 720px) {
        main {
          padding: 16px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Rings browser connectivity example</h1>
      <p>
        Browser peers join through a seed node HTTP endpoint, connect by DID,
        then exchange namespaced messages on the <code>example</code> protocol.
      </p>

      <section>
        <h2>Local provider</h2>
        <div class="grid">
          <label>
            Network ID
            <input id="network-id" type="number" min="0" value="1" />
          </label>
          <label>
            Stabilize interval seconds
            <input id="stabilize-interval" type="number" min="1" value="3" />
          </label>
          <label style="grid-column: 1 / -1">
            ICE servers
            <input id="ice-servers" value="stun://stun.l.google.com:19302" />
          </label>
        </div>
        <div class="row" style="margin-top: 12px">
          <button id="start-provider">Start provider</button>
          <button id="copy-did" class="secondary" disabled>Copy DID</button>
        </div>
        <p style="margin-top: 12px">DID</p>
        <div id="local-did" class="value">not started</div>
      </section>

      <section>
        <h2>Connect</h2>
        <div class="grid">
          <label>
            Seed HTTP endpoint
            <input id="seed-url" value="http://127.0.0.1:50001" />
          </label>
          <label>
            Remote peer DID
            <input id="remote-did" placeholder="0x..." />
          </label>
        </div>
        <div class="row" style="margin-top: 12px">
          <button id="connect-seed" disabled>Connect seed</button>
          <button id="connect-did" disabled>Connect DID</button>
          <button id="list-peers" class="secondary" disabled>List peers</button>
        </div>
      </section>

      <section>
        <h2>Message</h2>
        <label>
          Message payload
          <textarea id="message">hello from browser</textarea>
        </label>
        <div class="row" style="margin-top: 12px">
          <button id="send-message" disabled>Send example message</button>
        </div>
      </section>

      <section>
        <h2>Log</h2>
        <pre id="log"></pre>
      </section>
    </main>

    <script type="module" src="./app.mjs"></script>
  </body>
</html>
